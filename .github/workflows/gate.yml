name: gate
on:
  pull_request:
    branches: [main]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Tests
        run: pnpm test
      - name: Commit message format
        run: |
          git log origin/main..HEAD --format=%B | grep -q "INTENT:" || \
            (echo "Missing INTENT: line in commit body" && exit 1)
      - name: Duplication gate (fails over 3%)
        run: npx jscpd apps packages --threshold 3 --exitCode 1
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
